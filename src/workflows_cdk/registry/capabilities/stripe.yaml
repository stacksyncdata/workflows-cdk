app:
  name: Stripe
  slug: stripe
  description: "Online payment processing platform"
  auth:
    type: api_key
    scopes: []
    fields:
      - { name: api_key, type: string, description: "Stripe secret API key" }

actions:
  - name: create_customer
    category: action
    description: "Create a new Stripe customer"
    required_fields:
      - { name: email, type: string, description: "Customer email address" }
    optional_fields:
      - { name: name, type: string, description: "Customer full name" }
      - { name: metadata, type: object, description: "Key-value metadata" }

  - name: create_charge
    category: action
    description: "Create a payment charge"
    required_fields:
      - { name: amount, type: number, description: "Amount in cents" }
      - { name: currency, type: string, description: "Three-letter ISO currency code" }
      - { name: customer, type: string, description: "Customer ID" }

  - name: list_customers
    category: search
    description: "List Stripe customers"
    required_fields: []
    optional_fields:
      - { name: limit, type: number, description: "Max results to return" }

  - name: get_balance
    category: search
    description: "Retrieve the current account balance"
    required_fields: []

triggers:
  - name: customer_created
    event: customer.created
    description: "Fires when a new customer is created"
    payload_fields:
      - { name: id, type: string }
      - { name: email, type: string }
      - { name: name, type: string }

  - name: payment_succeeded
    event: payment_intent.succeeded
    description: "Fires when a payment succeeds"
    payload_fields:
      - { name: id, type: string }
      - { name: amount, type: number }
      - { name: currency, type: string }
      - { name: customer, type: string }

examples:
  - "Stripe connector to create customers and process payments"
  - "Listen for new Stripe payments"
  - "Stripe: create customer, charge, list customers"
